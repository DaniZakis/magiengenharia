<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Maggi Engenharia gear icon - brand color #D4A033 -->
  <g transform="translate(64,64)">
    <!-- Gear teeth -->
    <rect x="-10" y="-62" width="20" height="20" rx="4" fill="#D4A033"/>
    <rect x="-10" y="42" width="20" height="20" rx="4" fill="#D4A033"/>
    <rect x="-62" y="-10" width="20" height="20" rx="4" fill="#D4A033"/>
    <rect x="42" y="-10" width="20" height="20" rx="4" fill="#D4A033"/>
    <rect x="-10" y="-62" width="20" height="20" rx="4" fill="#D4A033" transform="rotate(45)"/>
    <rect x="-10" y="42" width="20" height="20" rx="4" fill="#D4A033" transform="rotate(45)"/>
    <rect x="-62" y="-10" width="20" height="20" rx="4" fill="#D4A033" transform="rotate(45)"/>
    <rect x="42" y="-10" width="20" height="20" rx="4" fill="#D4A033" transform="rotate(45)"/>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="44" fill="#D4A033"/>
    <!-- Inner cutout -->
    <circle cx="0" cy="0" r="28" fill="white"/>
    <style>
      @media (prefers-color-scheme: dark) {
        circle:last-of-type { fill: #1a1a1a; }
      }
    </style>
  </g>
</svg>
